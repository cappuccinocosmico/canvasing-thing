# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  # Pinned to nixpkgs commit that ships playwright 1.60.0 so the browser
  # binary matches the npm package. Update this commit + package.json in
  # lockstep (see scripts.playwright-version-check in devenv.nix).
  nixpkgs-playwright:
    url: github:NixOS/nixpkgs/3d46470bb3030020f7e1361f33514854f5bfa86d

# If you're using non-OSS software, you can set allow_unfree to true.
# allow_unfree: true

# If you're not willing to allow unsupported packages:
# allow_unsupported_system: false

# If you're willing to use a package that's vulnerable
# permitted_insecure_packages:
#  - "openssl-1.1.1w"

# If you have more than one devenv you can merge them
#imports:
# - ./backend
